<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF9A5C"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#c8440a" flood-opacity="0.35"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Shine overlay -->
  <rect width="1024" height="512" rx="220" ry="220" fill="url(#shine)" clip-path="url(#roundClip)"/>

  <!-- Subtle texture ring -->
  <circle cx="512" cy="512" r="430" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.08"/>
  <circle cx="512" cy="512" r="380" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.05"/>

  <!-- Fork & knife icon -->
  <g transform="translate(512, 310)" filter="url(#shadow)">
    <!-- Fork (left) -->
    <g transform="translate(-68, 0)" fill="#ffffff" opacity="0.92">
      <!-- Tines -->
      <rect x="-18" y="-90" width="7" height="52" rx="3.5"/>
      <rect x="-6"  y="-90" width="7" height="52" rx="3.5"/>
      <rect x="6"   y="-90" width="7" height="52" rx="3.5"/>
      <!-- Bridge -->
      <rect x="-18" y="-44" width="31" height="10" rx="5"/>
      <!-- Handle -->
      <rect x="-5"  y="-36" width="9" height="110" rx="4.5"/>
    </g>
    <!-- Knife (right) -->
    <g transform="translate(68, 0)" fill="#ffffff" opacity="0.92">
      <!-- Blade -->
      <path d="M-4,-90 Q14,-80 14,-30 L-4,-30 Z" rx="2"/>
      <!-- Handle -->
      <rect x="-4" y="-30" width="9" height="110" rx="4.5"/>
    </g>
    <!-- Plate circle -->
    <circle cx="0" cy="30" r="52" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.75"/>
    <circle cx="0" cy="30" r="35" fill="#ffffff" opacity="0.15"/>
  </g>

  <!-- FOOD text -->
  <text
    x="512" y="618"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="148"
    font-weight="800"
    letter-spacing="12"
    text-anchor="middle"
    fill="#ffffff"
    opacity="1"
  >FOOD</text>

  <!-- RANK text -->
  <text
    x="512" y="748"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="148"
    font-weight="800"
    letter-spacing="12"
    text-anchor="middle"
    fill="#ffffff"
    opacity="0.88"
  >RANK</text>

  <!-- Underline accent -->
  <rect x="332" y="770" width="360" height="6" rx="3" fill="#ffffff" opacity="0.35"/>
</svg>
